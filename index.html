<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#04121D" />
  <title>Packfolio</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Onest из Google Fonts (из Figma) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>

<div id="app">

  <!-- Шапка -->
  <div class="top-bar-wrap">
    <header class="top-bar">
      <h1 id="page-title">Поездки</h1>
      <div id="header-actions"></div>
    </header>
  </div>

  <!-- Основной контент -->
  <main class="page" id="page-content">
    <div class="loader"><div class="spinner"></div></div>
  </main>

  <!-- Нижняя навигация — плавающий пилл (из Figma: 312×64px, radius 24px) -->
  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">

      <button class="nav-btn active" data-tab="home" onclick="App.navigate('home')">
        <span class="nav-icon">🏠</span>
        <span>Главная</span>
      </button>

      <button class="nav-btn" data-tab="trips" onclick="App.navigate('trips')">
        <span class="nav-icon">✈️</span>
        <span>Поездки</span>
      </button>

      <button class="nav-btn" data-tab="docs" onclick="App.navigate('docs')">
        <span class="nav-icon">📄</span>
        <span>Документы</span>
      </button>

      <button class="nav-btn" data-tab="calendar" onclick="App.navigate('calendar')">
        <span class="nav-icon">📅</span>
        <span>Календарь</span>
      </button>

    </nav>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- FAB -->
<button class="fab hidden" id="fab" onclick="App.fabAction()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M12 5V19M5 12H19" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
</button>

<script src="app.js?v=3"></script>
</body>
</html>
